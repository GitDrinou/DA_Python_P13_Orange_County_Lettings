name: CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  lint-and-tests:
    name: Linting and Tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "False"
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8
        run: |
          flake8 .

      - name: Run tests for oc_lettings_site
        run: |
          pytest oc_lettings_site/tests \
          --cov=oc_lettings_site \
          --cov-fail-under=80

      - name: Run tests for lettings
        run: |
          pytest lettings/tests \
          --cov=lettings \
          --cov-fail-under=80

      - name: Run tests for profiles
        run: |
          pytest profiles/tests \
          --cov=profiles \
          --cov-fail-under=80

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-tests

    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings-site${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings-site:latest
            
